name: "Felpojam Export Script" 
on:
  push:
    branches:
    - main

env:
  GODOT_VERSION: 4.6.0
  USER_VERSION: "1.0.${{ github.run_number }}"
  GAME_NAME: "RuinasDeKrimbo"

jobs:
  build-desktop-clients:
    name: Export Game Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout
      
      - uses: chickensoft-games/setup-godot@v2
        name: Setup Godot
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Prepare directories
        run: mkdir -p compiled/windows compiled/linux compiled/web

      - name: Export Linux release
        run: godot --headless --path ./source/ --export-release linux ../compiled/linux/${{ env.GAME_NAME }}.x86_64

      - name: Export Windows release
        run: godot --headless --path ./source/ --export-release windows ../compiled/windows/${{ env.GAME_NAME }}.exe

      - name: Export Web release
        run: godot --headless --path ./source/ --export-release web ../compiled/web/index.html

      - uses: manleydev/butler-publish-itchio-action@master
        name: Publish Windows Version
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: ruinas-de-krimbo
          ITCH_USER: lazaromenezes
          PACKAGE: compiled/windows
          VERSION: ${{ env.USER_VERSION }}

      - uses: manleydev/butler-publish-itchio-action@master
        name: Publish Linux Version
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: ruinas-de-krimbo
          ITCH_USER: lazaromenezes
          PACKAGE: compiled/linux
          VERSION: ${{ env.USER_VERSION }}
      
      - uses: manleydev/butler-publish-itchio-action@master
        name: Publish Web Version
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: web
          ITCH_GAME: ruinas-de-krimbo
          ITCH_USER: lazaromenezes
          PACKAGE: compiled/web
          VERSION: ${{ env.USER_VERSION }}
